<title>Simulador de Ventas · Utel Universidad</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f0f4f0; display: flex; justify-content: center; min-height: 100vh; }
#app { display: flex; flex-direction: column; height: 100vh; width: 100%; max-width: 640px; background: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.08); }

/* REGISTRO */
#register-panel { display: flex; flex-direction: column; justify-content: center; align-items: center; flex: 1; padding: 32px 24px; gap: 20px; }
.reg-logo { font-size: 48px; }
.reg-title { font-size: 20px; font-weight: 700; color: #1e5c2a; text-align: center; }
.reg-subtitle { font-size: 13px; color: #666; text-align: center; line-height: 1.5; }
.reg-form { width: 100%; display: flex; flex-direction: column; gap: 12px; }
.reg-input { width: 100%; padding: 11px 14px; border: 1.5px solid #d0d0d0; border-radius: 10px; font-size: 14px; outline: none; font-family: inherit; }
.reg-input:focus { border-color: #2d7a3a; }
.reg-btn { width: 100%; padding: 13px; background: #2d7a3a; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
.reg-btn:hover { background: #246130; }
.reg-note { font-size: 11px; color: #999; text-align: center; }

/* GAME SCREENS - ocultas al inicio */
#header { background: #1e5c2a; color: #fff; padding: 12px 16px; display: none; align-items: center; gap: 12px; flex-shrink: 0; }
#score-bar { background: #f0f7f1; border-bottom: 1px solid #c8e6c9; padding: 7px 16px; display: none; gap: 10px; flex-shrink: 0; flex-wrap: wrap; align-items: center; }
#chat { flex: 1; overflow-y: auto; padding: 14px 16px; display: none; flex-direction: column; gap: 10px; }
#input-area { padding: 10px 12px; border-top: 1px solid #e0e0e0; display: none; gap: 8px; flex-shrink: 0; align-items: flex-end; background: #fff; }
#fin-bar { padding: 6px 12px; border-top: 1px solid #e0e0e0; background: #fff; display: none; justify-content: center; }
#result-panel { display: none; flex-direction: column; align-items: center; padding: 24px 20px; text-align: center; gap: 12px; overflow-y: auto; }

/* HEADER */
#lead-avatar { width: 42px; height: 42px; border-radius: 50%; background: #2d7a3a; border: 2px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
#lead-info h2 { font-size: 14px; font-weight: 600; }
#lead-info p { font-size: 11px; opacity: 0.75; margin-top: 2px; }
#stage-badge { margin-left: auto; font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: 20px; background: rgba(255,255,255,0.18); white-space: nowrap; flex-shrink: 0; }

/* SCORE BAR */
.score-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #3b6d11; font-weight: 500; }
.score-dot { width: 9px; height: 9px; border-radius: 50%; background: #ccc; transition: background 0.3s; flex-shrink: 0; }
.score-dot.done { background: #2d7a3a; }
.score-prog { font-size: 10px; opacity: 0.65; }

/* CHAT */
.msg { display: flex; gap: 8px; align-items: flex-end; }
.msg.lead { flex-direction: row; }
.msg.asesor { flex-direction: row-reverse; }
.bubble { max-width: 78%; padding: 10px 13px; border-radius: 16px; font-size: 13px; line-height: 1.5; }
.msg.lead .bubble { background: #f1f1f1; border-radius: 16px 16px 16px 4px; color: #1a1a1a; }
.msg.asesor .bubble { background: #2d7a3a; color: #fff; border-radius: 16px 16px 4px 16px; }
.avatar-sm { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.avatar-lead { background: #e8f5e9; }
.avatar-asesor { background: #1e5c2a; color: white; font-size: 10px; font-weight: 700; }
.feedback-card { border-left: 3px solid #f39c12; border-radius: 8px; padding: 9px 13px; font-size: 12px; line-height: 1.5; margin: 0 6px; background: #fff8e1; color: #7d5a00; }
.feedback-card.good { background: #f0f7f1; border-left-color: #2d7a3a; color: #1e5c2a; }
.feedback-card.bad { background: #fdecea; border-left-color: #c0392b; color: #7b1a1a; }
.typing { display: flex; gap: 4px; padding: 12px 14px; background: #f1f1f1; border-radius: 16px 16px 16px 4px; width: fit-content; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: #aaa; animation: bounce 1.2s infinite; display: block; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)} }

/* INPUT */
#msg-input { flex: 1; padding: 9px 13px; border: 1px solid #bdbdbd; border-radius: 20px; font-size: 14px; background: #fff; color: #1a1a1a; resize: none; font-family: inherit; outline: none; max-height: 80px; }
#msg-input:focus { border-color: #2d7a3a; }
#send-btn { width: 40px; height: 40px; border-radius: 50%; background: #2d7a3a; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
#send-btn:hover { background: #246130; }
#send-btn:disabled { background: #aaa; cursor: default; }
#hint-btn { font-size: 11px; color: #666; background: none; border: 1px solid #ddd; border-radius: 12px; padding: 5px 10px; cursor: pointer; flex-shrink: 0; white-space: nowrap; }
#hint-btn:hover { background: #f5f5f5; }
#fin-sim-btn { font-size: 11px; color: #c0392b; background: none; border: 1px solid #f5c6cb; border-radius: 12px; padding: 5px 16px; cursor: pointer; }
#fin-sim-btn:hover { background: #fdecea; }

/* RESULTADO */
.result-score { font-size: 52px; font-weight: 700; color: #2d7a3a; }
.result-label { font-size: 14px; color: #444; line-height: 1.5; max-width: 400px; }
.checklist { text-align: left; width: 100%; background: #f5f5f5; border-radius: 12px; padding: 12px 14px; }
.check-item { display: flex; gap: 10px; align-items: flex-start; font-size: 13px; padding: 7px 0; border-bottom: 1px solid #e0e0e0; }
.check-item:last-child { border-bottom: none; }
.check-detail { font-size: 11px; color: #888; margin-top: 2px; }
.conclusion-box { width: 100%; background: #f0f7f1; border: 1px solid #c8e6c9; border-radius: 12px; padding: 14px; text-align: left; font-size: 13px; line-height: 1.6; }
.conclusion-title { font-size: 12px; font-weight: 700; color: #1e5c2a; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.outcome-tag { font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 20px; }
.outcome-inscrito  { background: #eaf3de; color: #1e5c2a; }
.outcome-no-amable { background: #fff3cd; color: #7d5a00; }
.outcome-corto     { background: #fdecea; color: #7b1a1a; }
.outcome-insulto   { background: #f8d7da; color: #5c1010; }
.outcome-sin-sec   { background: #e8f4fd; color: #1a5276; }
#new-game-btn { background: #2d7a3a; color: white; border: none; border-radius: 8px; padding: 12px 28px; font-size: 14px; font-weight: 600; cursor: pointer; }
#new-game-btn:hover { background: #246130; }
.mail-status { font-size: 11px; color: #888; }
.mail-status.sending { color: #f39c12; }
.mail-status.sent { color: #2d7a3a; }
</style>

  return { saludo:stages.saludo, secundario:stages.secundario, sondeo:acum.preguntas>=3, beneficios:acum.beneficios>=5, objecion:acum.objecionRefutada, cierre:stages.cierre };
}

// ─── REGISTRO ─────────────────────────────────────────────────────────────────
function startSession() {
  const nombre = document.getElementById('reg-nombre').value.trim();
  const mail   = document.getElementById('reg-mail').value.trim();
  if (!nombre || !mail || !mail.includes('@')) {
    alert('Por favor ingresá tu nombre completo y un mail válido.');
    return;
  }
  asesorNombre = nombre;
  asesorMail   = mail;
  document.getElementById('register-panel').style.display = 'none';
  initGame();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
function initGame() {
  lead = LEADS[Math.floor(Math.random() * LEADS.length)];
  messages = []; isLoading = false; gameOver = false; redirectCount = 0;
  stages = { saludo:false, secundario:false, cierre:false };
  acum   = { preguntas:0, beneficios:0, objecionPendiente:false, objecionRefutada:false, escuchaFallas:0 };

  document.getElementById('chat').innerHTML = '';
  document.getElementById('result-panel').style.display   = 'none';
  document.getElementById('conclusion-box').style.display = 'none';
  document.getElementById('mail-status').textContent      = '';

  show('header'); show('score-bar'); showFlex('chat');
  showFlex('input-area'); showFlex('fin-bar');

  document.getElementById('lead-name').textContent  = lead.name;
  document.getElementById('lead-desc').textContent  = lead.age + ' años · ' + lead.career;
  document.getElementById('lead-avatar').textContent = lead.emoji;
  document.getElementById('stage-badge').textContent = 'Etapa: Saludo';
  updateUI();

  setTimeout(() => addBubble('lead', '¿Hola? ¿Quién habla?'), 700);
  document.getElementById('msg-input').value = '';
  document.getElementById('msg-input').focus();
}

function show(id)     { document.getElementById(id).style.display = 'flex'; }
function showFlex(id) { document.getElementById(id).style.display = 'flex'; }
function hide(id)     { document.getElementById(id).style.display = 'none'; }

// ─── UI ───────────────────────────────────────────────────────────────────────
function updateUI() {
  const s = getStages();
  ['saludo','secundario','sondeo','beneficios','objecion','cierre'].forEach(k => {
    const d = document.getElementById('dot-' + k); if (d) d.className = 'score-dot' + (s[k] ? ' done' : '');
  });
  document.getElementById('prog-sondeo').textContent    = Math.min(acum.preguntas, 3) + '/3';
  document.getElementById('prog-beneficios').textContent = Math.min(acum.beneficios, 5) + '/5';
  if (!stages.saludo) { document.getElementById('stage-badge').textContent = 'Etapa: Saludo'; return; }
  if (!stages.secundario) { document.getElementById('stage-badge').textContent = 'Etapa: Secundario'; return; }
  if (!stages.cierre) {
    const p = [];
    if (acum.preguntas < 3) p.push('Sondeo ' + acum.preguntas + '/3');
    if (acum.beneficios < 5) p.push('Beneficios ' + acum.beneficios + '/5');
    if (acum.objecionPendiente) p.push('⚠️ Refutá objeción');
    document.getElementById('stage-badge').textContent = p.length ? p.join(' · ') : 'Listo para cerrar';
  }
}

function addBubble(role, text) {
  const chat = document.getElementById('chat');
  const msg = document.createElement('div'); msg.className = 'msg ' + role;
  const av  = document.createElement('div'); av.className  = 'avatar-sm ' + (role === 'lead' ? 'avatar-lead' : 'avatar-asesor');
  av.textContent = role === 'lead' ? lead.emoji : 'VOS';
  const bubble = document.createElement('div'); bubble.className = 'bubble'; bubble.textContent = text;
  msg.appendChild(av); msg.appendChild(bubble); chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function addFeedback(quality, feedback, tip) {
  if (!feedback) return;
  const chat = document.getElementById('chat');
  const card = document.createElement('div');
  card.className = 'feedback-card ' + (quality === 'good' ? 'good' : quality === 'bad' ? 'bad' : '');
  const icon = quality === 'good' ? '✅' : quality === 'bad' ? '❌' : '💡';
  card.innerHTML = '<strong>' + icon + ' ' + feedback + '</strong>' + (tip ? '<br><span style="opacity:0.85">→ ' + tip + '</span>' : '');
  chat.appendChild(card); chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const t = document.createElement('div'); t.className = 'msg lead'; t.id = 'typing-ind';
  t.innerHTML = '<div class="avatar-sm avatar-lead">' + lead.emoji + '</div><div class="typing"><span></span><span></span><span></span></div>';
  chat.appendChild(t); chat.scrollTop = chat.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typing-ind'); if (t) t.remove(); }

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

// ─── API PROXY ────────────────────────────────────────────────────────────────
async function callAI(system, msgs, maxTokens) {
  const geminiMsgs = msgs.map(m => ({
    role: m.role === 'assistant' ? 'model' : 'user',
    parts: [{ text: m.content }]
  }));
  const res = await fetch(PROXY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type:'gemini', system, messages: geminiMsgs, maxTokens: maxTokens || 1000 })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.text;
}

// ─── PROMPT DEL LEAD ─────────────────────────────────────────────────────────

  const sinSecPrompt = `Cuando te pregunten si terminaste el secundario, decís honestamente que no, te falta 1 año. Si el asesor detecta esto y cierra la conversación amablemente explicando que es requisito, respondés con comprensión y te despedís. Si el asesor intenta venderte igual, te confundís y eventualmente preguntás si podés inscribirte igual.`;
  const conSecPrompt = `DESENLACES POSIBLES según cómo se comporte el asesor:
INSCRIPCIÓN: ${lead.outcomes.inscrito}
NO AMABLE: ${lead.outcomes.no_amable}
CORTÓ: ${lead.outcomes.corto}
INSULTO: ${lead.outcomes.insulto}
Si cerrás la venta, dá nombre completo (${lead.name}), DNI de 8 dígitos inventado, forma de pago (${lead.payment}).`;

  return `Sos ${lead.name}, ${lead.age} años. ${lead.job}. ${lead.study}. ${lead.goal}. Tu objeción: ${lead.objection}.
Estás recibiendo una llamada de un asesor de Utel Universidad, universidad 100% online de México con títulos oficiales SEP y apostilla de La Haya en más de 90 países.
COMPORTAMIENTO: Respondé natural y realista. Al principio estás desconfiado. Si el asesor se presenta bien, abrís más. ${lead.hasSecundario ? 'Confirmás que tenés el secundario cuando te pregunten.' : sinSecPrompt}
Si el asesor ignora tus preguntas directas, te frustrás y lo mencionás. Respondé en 1-4 oraciones cortas como en una llamada. Hablá en español rioplatense (vos, tenés, querés). NO rompas el personaje.
${lead.hasSecundario ? conSecPrompt : ''}`;
}

// ─── EVALUADOR — SYSTEM FIJO (INTERPRETATIVO, SIEMPRE) ───────────────────────
function getEvalSystem() {
  return `Sos un coach de ventas evaluando mensajes de asesores comerciales de Utel Universidad Argentina.

REGLA ABSOLUTA E INAMOVIBLE — SE APLICA EN CADA EVALUACIÓN SIN EXCEPCIÓN:
Interpretá siempre el SENTIDO y la INTENCIÓN. NUNCA evalúes las palabras literales, el estilo, el orden, la formalidad ni la gramática. Cada asesor se expresa diferente. Todos son válidos si comunican lo que necesitan comunicar.

EJEMPLOS CONCRETOS DE INTERPRETACIÓN GENEROSA:
- "buenas soy juan de utel" → saludo cumplido ✅
- "hola te llamo porque utel tiene algo para vos" → saludo cumplido ✅
- "che terminaste el cole?" → verificación de secundario ✅
- "contame de vos" → pregunta de sondeo ✅
- "te pido disculpas, contame de tu interés por la carrera" → sondeo + empatía ✅
- "tenemos flexibilidad total para estudiar" → beneficio mencionado ✅
- "mirá no te preocupes por eso" → intento de rebatir objeción ✅
- "entiendo, es una preocupación válida" → transición válida ✅
- "y bueno, cada uno tiene sus tiempos" → transición válida ✅

EN CASO DE DUDA SIEMPRE ELEGÍ "good". Solo "bad" cuando el error es claro, concreto e inequívoco y daña la venta.

Respondé SIEMPRE con JSON válido exacto:
{"stage":"saludo|secundario|sondeo|beneficios|objecion|cierre|general","quality":"good|warning|bad","isRedirect":false,"nuevasPreguntas":0,"nuevosBeneficios":0,"objecionDetectada":false,"refutoObjecion":false,"refutoInmediato":false,"ignoroConsulta":false,"feedback":"1 oración breve","tip":"1 consejo o confirmación"}`;
}

function getEvalContext(text) {
  const s = getStages();
  const completadas = Object.keys(s).filter(k => s[k]);
  return `CONTEXTO: Lead: ${lead.name}, ${lead.age} años. Objeción: ${lead.objection}.
Etapas cumplidas (NO volver a evaluar): ${completadas.length ? completadas.join(', ') : 'ninguna'}.
Preguntas sondeo acumuladas: ${acum.preguntas}/3. Beneficios mencionados: ${acum.beneficios}/5. Objeción pendiente: ${acum.objecionPendiente}.

CRITERIOS (interpretá el SENTIDO no las palabras):
- saludo: ¿comunicó quién es o que llama de Utel? cualquier variante vale
- secundario: ¿preguntó de cualquier forma por el nivel educativo del prospecto?
- nuevasPreguntas: expresiones que busquen conocer al prospecto (preguntas, invitaciones a hablar, interés). Máximo 3.
- nuevosBeneficios: menciones positivas de Utel (RVOE, apostilla, flexibilidad, online, acompañamiento, Voxy, Platzi, empleabilidad, comunidad, campus, Asistencia Universitaria, cuotas, maestrías, etc.)
- objecionDetectada: ¿el lead expresó duda, resistencia o preocupación?
- refutoObjecion: ¿el asesor intentó responder o abordar una objeción de cualquier manera?
- refutoInmediato: ¿lo hizo en este turno o el siguiente?
- ignoroConsulta: ¿el lead hizo pregunta directa específica que el asesor ignoró TOTALMENTE? En duda: false
- isRedirect: ¿es transición natural (empatía, repregunta, conexión)? En duda: true
- cierre: ¿pidió datos para inscribir (nombre, DNI, pago)?

MENSAJE A EVALUAR: "${text}"`;
}

// ─── DETECTAR DESENLACE ───────────────────────────────────────────────────────
function detectOutcome(reply) {
  const r = reply.toLowerCase();
  if (/\d{7,8}/.test(reply) && /(tarjeta|transferencia|débito|efectivo|cuotas|pago)/i.test(reply)) return 'inscrito';
  if (!lead.hasSecundario && /(requisito|no podés|no podes|cuando termines|lamentablemente|sin el secundario)/i.test(r)) return 'sin_secundario';
  if (/(andate|la concha|puta|imbécil|idiota|no me llames más|borrame|no me jodas|hdp)/i.test(r)) return 'insulto';
  if (/(corto\.|cuelga|chau\.|hasta luego\.|no me interesa para nada)/i.test(r) && reply.length < 120) return 'corto';
  if (/(lo voy a pensar|lo pienso|te llamo yo|no por ahora|en otro momento|no es para mí)/i.test(r)) return 'no_amable';
  return null;
}

// ─── ENVIAR MENSAJE ───────────────────────────────────────────────────────────
async function sendMessage() {
  if (isLoading || gameOver) return;
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text) return;
  input.value = '';
  addBubble('asesor', text);
  messages.push({ role:'user', content: text });
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  const evalPromise = evaluateMessage(text);
  showTyping();

  try {
    const reply = await callAI(getLeadPrompt(), messages);
    removeTyping();
    addBubble('lead', reply);
    messages.push({ role:'assistant', content: reply });

    const outcome = detectOutcome(reply);
    if (outcome) {
      if (outcome === 'inscrito')       stages.cierre    = true;
      if (outcome === 'sin_secundario') stages.secundario = true;
      await evalPromise;
      updateUI();
      setTimeout(() => showResult(outcome), 1000);
    }
  } catch(err) {
    removeTyping();
    console.error('Error API:', err);
    addFeedback('bad', 'Error de conexión. Verificá tu conexión a internet.', 'Intentá enviar el mensaje nuevamente.');
  }
  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

// ─── EVALUAR MENSAJE ──────────────────────────────────────────────────────────
async function evaluateMessage(text) {
  try {
    const raw = await callAI(getEvalSystem(), [{ role:'user', content: getEvalContext(text) }]);
    const r   = JSON.parse(raw.replace(/```json|```/g,'').trim());

    if (typeof r.nuevasPreguntas  === 'number') acum.preguntas  += r.nuevasPreguntas;
    if (typeof r.nuevosBeneficios === 'number') acum.beneficios += r.nuevosBeneficios;
    if (r.objecionDetectada) acum.objecionPendiente = true;
    if (r.refutoObjecion)    { acum.objecionPendiente = false; if (r.refutoInmediato) acum.objecionRefutada = true; }
    if (r.ignoroConsulta)    acum.escuchaFallas++;

    if (r.quality === 'good') {
      if (r.stage === 'saludo'     && !stages.saludo)     { stages.saludo    = true; redirectCount = 0; }
      if (r.stage === 'secundario' && !stages.secundario) { stages.secundario = true; redirectCount = 0; }
      if (r.stage === 'cierre'     && !stages.cierre)       stages.cierre    = true;
    }
    updateUI();

    if (r.isRedirect) {
      redirectCount++;
      if (r.quality === 'warning') addFeedback('warning', r.feedback, r.tip);
      return;
    }
    redirectCount = 0;

    if (r.ignoroConsulta) {
      addFeedback('bad', 'El lead hizo una consulta y no la respondiste.', 'Respondé primero lo que pregunta el lead antes de continuar.');
      return;
    }
    if (acum.objecionPendiente && !r.refutoObjecion) {
      addFeedback('bad', 'El lead planteó una objeción que no refutaste.', 'Refutá la objeción antes de avanzar.');
      return;
    }
    if (r.feedback) addFeedback(r.quality, r.feedback, r.tip);
  } catch(e) { console.error('Eval error:', e); }
}

// ─── PISTA ────────────────────────────────────────────────────────────────────
function getHint() {
  if (!stages.saludo)       { addFeedback('warning', '💡 Pista', 'Saludá, presentate con tu nombre y contale que llamás de Utel Universidad.'); return; }
  if (!stages.secundario)   { addFeedback('warning', '💡 Pista', !lead.hasSecundario && messages.length > 6 ? 'Este lead no tiene secundario. Informale que es requisito y cerrá la conversación cordialmente.' : 'Preguntale si tiene el secundario completo.'); return; }
  if (acum.objecionPendiente) { addFeedback('warning', '💡 Pista', 'El lead planteó una objeción. Refutala con argumentos: RVOE, apostilla, flexibilidad, acompañamiento.'); return; }
  if (acum.preguntas < 3)   { addFeedback('warning', '💡 Pista', 'Te faltan ' + (3-acum.preguntas) + ' pregunta(s) de sondeo. Preguntá sobre su trabajo, objetivos o situación.'); return; }
  if (acum.beneficios < 5)  { addFeedback('warning', '💡 Pista', 'Mencionaste ' + acum.beneficios + '/5 beneficios. Podés sumar: RVOE, apostilla, flexibilidad, acompañamiento, Voxy, empleabilidad, comunidad, Asistencia Universitaria.'); return; }
  if (!acum.objecionRefutada) { addFeedback('warning', '💡 Pista', 'Todavía no refutaste ninguna objeción. Escuchá cuando el lead dude y respondé de inmediato.'); return; }
  addFeedback('warning', '💡 Pista', '¡Cumpliste todo! Pedile nombre completo, DNI y forma de pago para concretar la inscripción.');
}

// ─── FIN SIMULADOR ────────────────────────────────────────────────────────────
function finSimulador() {
  if (gameOver) return;
  gameOver = true;
  hide('input-area'); hide('fin-bar');
  addBubble('lead', 'Cortó el teléfono.');
  addFeedback('bad', '📵 El cliente cortó la llamada.', 'La venta no se concretó. Se genera el informe con el progreso registrado.');
  showResult('corto');
}

// ─── RESULTADO FINAL ──────────────────────────────────────────────────────────
async function showResult(outcome) {
  gameOver = true;
  hide('input-area'); hide('fin-bar');
  hide('chat');

  const s = getStages();
  const completed = Object.values(s).filter(Boolean).length;
  const pct = Math.round((completed / 6) * 100);

  const cfg = {
    inscrito:      { score:pct+'%', label:'🎉 ¡Cerraste la venta! '+lead.name+' se inscribió.', badge:'outcome-inscrito', badgeText:'✅ VENTA CERRADA' },
    sin_secundario:{ score:'✓',    label:'👏 ¡Bien manejado! Detectaste que '+lead.name+' no tiene secundario.', badge:'outcome-sin-sec', badgeText:'📋 LEAD NO POTABLE — BIEN CERRADO' },
    no_amable:     { score:pct+'%', label:'😐 '+lead.name+' decidió no inscribirse. Revisá las etapas incompletas.', badge:'outcome-no-amable', badgeText:'🤝 NO AMABLE' },
    corto:         { score:pct+'%', label:'📵 '+lead.name+' cortó el teléfono.', badge:'outcome-corto', badgeText:'📵 CORTÓ EL TELÉFONO' },
    insulto:       { score:pct+'%', label:'😬 '+lead.name+' se enojó y cortó.', badge:'outcome-insulto', badgeText:'🚫 INSULTO Y COLGÓ' }
  }[outcome] || { score:pct+'%', label:'La llamada terminó.', badge:'outcome-corto', badgeText:'📵 FIN' };

  document.getElementById('final-score').textContent = cfg.score;
  document.getElementById('final-label').textContent = cfg.label;
  const badge = document.getElementById('outcome-badge');
  badge.className = 'outcome-tag ' + cfg.badge;
  badge.textContent = cfg.badgeText;

  const labels = {
    saludo:    {label:'Saludo y presentación',         detail:''},
    secundario:{label:'Verificación de secundario',    detail:''},
    sondeo:    {label:'Sondeo comercial',              detail:'('+Math.min(acum.preguntas,3)+'/3 preguntas)'},
    beneficios:{label:'Bajada de beneficios de Utel',  detail:'('+Math.min(acum.beneficios,5)+'/5 beneficios)'},
    objecion:  {label:'Rebate de objeción',            detail: acum.escuchaFallas > 0 ? '('+acum.escuchaFallas+' consulta(s) ignorada(s))' : ''},
    cierre:    {label:'Cierre y obtención de datos',   detail:''}
  };
  document.getElementById('final-checklist').innerHTML = Object.keys(s).map(k =>
    '<div class="check-item"><span style="flex-shrink:0">'+(s[k]?'✅':'❌')+'</span><div><div>'+labels[k].label+'</div>'+(labels[k].detail?'<div class="check-detail">'+labels[k].detail+'</div>':'')+'</div></div>'
  ).join('');

  document.getElementById('result-panel').style.display = 'flex';
  await generateAndSave(outcome, pct, s);
}

async function generateAndSave(outcome, pct, s) {
  document.getElementById('conclusion-box').style.display = 'block';
  document.getElementById('conclusion-text').textContent  = 'Generando análisis...';
  const ms = document.getElementById('mail-status');
  ms.className = 'mail-status sending'; ms.textContent = '⏳ Registrando resultados...';

  const convoSummary = messages.map(m => (m.role === 'user' ? asesorNombre : lead.name) + ': ' + m.content).join('
');
  const conclusionPrompt = `Analizá el desempeño de ${asesorNombre} en un simulador de ventas de Utel Universidad.
Lead: ${lead.name} — ${lead.career}. Resultado: ${outcome} (${pct}% de etapas).
Etapas: Saludo ${s.saludo?'✅':'❌'}, Secundario ${s.secundario?'✅':'❌'}, Sondeo ${acum.preguntas}/3 ${s.sondeo?'✅':'❌'}, Beneficios ${acum.beneficios}/5 ${s.beneficios?'✅':'❌'}, Objeción ${s.objecion?'✅':'❌'}, Cierre ${s.cierre?'✅':'❌'}. Consultas ignoradas: ${acum.escuchaFallas}.
Conversación:
${convoSummary}
Escribí 3-4 párrafos: qué hizo bien (con ejemplos), qué puede mejorar (con ejemplos), y un consejo para la próxima llamada. Tono de coach: honesto, constructivo, alentador. Dirigite en segunda persona (vos). Máximo 200 palabras.`;

  let conclusion = '';
  try {
    conclusion = await callAI('Sos un coach de ventas experto. Respondé en español rioplatense, tono constructivo y alentador.', [{ role:'user', content: conclusionPrompt }], 600);
    document.getElementById('conclusion-text').textContent = conclusion;
  } catch(e) {
    conclusion = 'No se pudo generar el análisis automático.';
    document.getElementById('conclusion-text').textContent = conclusion;
  }

  const outcomeLabels = { inscrito:'✅ VENTA CERRADA', sin_secundario:'📋 LEAD NO POTABLE — BIEN CERRADO', no_amable:'🤝 NO AMABLE', corto:'📵 CORTÓ EL TELÉFONO', insulto:'🚫 INSULTO Y COLGÓ' };
  const payload = {
    type:'registro', fecha: new Date().toLocaleString('es-AR'),
    asesor_nombre: asesorNombre, asesor_mail: asesorMail,
    lead_nombre: lead.name, lead_carrera: lead.career,
    resultado: outcomeLabels[outcome] || outcome, puntaje: pct+'%',
    saludo:     s.saludo     ? '✅' : '❌',
    secundario: s.secundario ? '✅' : '❌',
    sondeo:     s.sondeo     ? '✅ ('+acum.preguntas+'/3)' : '❌ ('+acum.preguntas+'/3)',
    beneficios: s.beneficios ? '✅ ('+acum.beneficios+'/5)' : '❌ ('+acum.beneficios+'/5)',
    objecion:   s.objecion   ? '✅' : '❌',
    cierre:     s.cierre     ? '✅' : '❌',
    escucha_fallas: acum.escuchaFallas, conclusion
  };

  try {
    const res = await fetch(PROXY, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const data = await res.json();
    if (data.status === 'ok') { ms.className = 'mail-status sent'; ms.textContent = '✅ Resultado registrado en Google Sheets'; }
    else throw new Error(data.error);
  } catch(err) {
    ms.className = 'mail-status'; ms.textContent = '⚠️ No se pudo registrar en Sheets.';
    console.error('Sheets error:', err);
  }
}

// ─── EVENTOS ─────────────────────────────────────────────────────────────────
document.getElementById('reg-btn').onclick     = startSession;
document.getElementById('send-btn').onclick    = sendMessage;
document.getElementById('hint-btn').onclick    = getHint;
document.getElementById('fin-sim-btn').onclick = finSimulador;
document.getElementById('new-game-btn').onclick = initGame;
document.getElementById('msg-input').addEventListener('keydown', handleKey);
document.getElementById('reg-nombre').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('reg-mail').focus(); });
document.getElementById('reg-mail').addEventListener('keydown',  e => { if (e.key==='Enter') startSession(); });
